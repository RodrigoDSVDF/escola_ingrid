<script>
    // --- SINTETIZADOR DE SONS (Web Audio API) ---
    function playSound(type) {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            if (type === 'click') {
                osc.frequency.setValueAtTime(450, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.04, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
                osc.start();
                osc.stop(ctx.currentTime + 0.08);
            } else if (type === 'success') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
                osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.2);
                osc.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.08, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                osc.start();
                osc.stop(ctx.currentTime + 0.4);
            } else if (type === 'fail') {
                osc.frequency.setValueAtTime(160, ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(60, ctx.currentTime + 0.25);
                gain.gain.setValueAtTime(0.12, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
                osc.start();
                osc.stop(ctx.currentTime + 0.25);
            } else if (type === 'evolve') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1500, ctx.currentTime + 0.6);
                gain.gain.setValueAtTime(0.08, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
                osc.start();
                osc.stop(ctx.currentTime + 0.6);
            }
        } catch (e) {
            console.log("Sons não suportados.");
        }
    }

    // --- CONFETES ---
    function triggerConfetti() {
        const container = document.getElementById('confetti-container');
        const colors = ['#34d399', '#6ee7b7', '#a7f3d0', '#60a5fa', '#3b82f6', '#fbbf24'];
        
        for (let i = 0; i < 40; i++) {
            const conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.left = Math.random() * 100 + 'vw';
            conf.style.top = Math.random() * -10 + 'px';
            conf.style.animationDelay = Math.random() * 0.4 + 's';
            conf.style.transform = `scale(${Math.random() * 1.1 + 0.5})`;
            container.appendChild(conf);
            
            setTimeout(() => conf.remove(), 2000);
        }
    }

    // --- SISTEMA GLOBAL DE XP E EVOLUÇÃO ---
    let xp = 0;
    let petState = 0;

    function ganharXP(val) {
        xp += val;
        if (xp >= 100) {
            xp = 0;
            petState++;
            if (petState > 3) petState = 3;
            playSound('evolve');
            triggerConfetti();
            falarComLeoRapido("UAU! ESTOU EVOLUINDO!");
        }
        atualizarProgressoVisual();
    }

    function atualizarProgressoVisual() {
        const bar = document.getElementById('xp-bar');
        const xpVal = document.getElementById('xp-val');
        const level = document.getElementById('pet-level');
        const name = document.getElementById('pet-name');
        const avatar = document.getElementById('pet-avatar');

        xpVal.innerText = xp;
        bar.style.width = Math.max(5, xp) + '%';

        if (petState === 0) {
            avatar.innerText = "🥚"; name.innerText = "Ovo do Leo"; level.innerText = "Fase: Ovo";
        } else if (petState === 1) {
            avatar.innerText = "🦖"; name.innerText = "Leo Bebê"; level.innerText = "Fase: Bebê";
        } else if (petState === 2) {
            avatar.innerText = "🦎"; name.innerText = "Leo Jovem"; level.innerText = "Fase: Aprendiz";
        } else {
            avatar.innerText = "🐉"; name.innerText = "Mestre Leo"; level.innerText = "Fase: Mestre";
        }
    }

    function falarComLeo() {
        playSound('click');
        const falas = [
            "A vírgula serve para separar os décimos! 🎯",
            "Estou ansioso para dividir com você! ⚠️",
            "Divisão com vírgula é fácil quando igualamos as casas!",
            "Não esqueça de subtrair o zero quando o número não couber!"
        ];
        falarComLeoRapido(falas[Math.floor(Math.random() * falas.length)]);
    }

    function falarComLeoRapido(txt) {
        const bubble = document.getElementById('pet-bubble');
        bubble.innerText = txt;
        bubble.classList.remove('hidden');
        // Aumenta o tempo de exibição para 5s e impede sobreposição
        clearTimeout(bubble._timeout);
        bubble._timeout = setTimeout(() => bubble.classList.add('hidden'), 5000);
    }

    // --- SISTEMA DE SELEÇÃO DE ABAS ---
    let currentTab = 'armadilha';
    function irParaAba(abaId) {
        playSound('click');
        currentTab = abaId;
        document.querySelectorAll('section').forEach(sec => {
            sec.classList.remove('block');
            sec.classList.add('hidden');
        });
        document.getElementById(`tab-${abaId}`).classList.remove('hidden');
        document.getElementById(`tab-${abaId}`).classList.add('block');
        
        document.querySelectorAll('nav button').forEach(btn => {
            btn.className = "py-3 px-1 md:px-4 rounded-2xl font-black text-xs md:text-base flex flex-col md:flex-row items-center justify-center gap-2 transition-all shadow-md bg-white text-slate-500 hover:bg-emerald-50";
        });

        const activeBtn = document.getElementById(`tab-btn-${abaId}`);
        activeBtn.className = "py-3 px-1 md:px-4 rounded-2xl font-black text-xs md:text-base flex flex-col md:flex-row items-center justify-center gap-2 transition-all shadow-md bg-emerald-500 text-white transform -translate-y-1";
    }


    // --- LÓGICA DO MÓDULO 1: LOUSA DINÂMICA COMPLETA ---
    let dynamicSteps = [];
    let activeStepIndex = 0;

    function iniciarContaDinamica() {
        playSound('click');
        const d1Str = document.getElementById('custom-divd').value.trim();
        const d2Str = document.getElementById('custom-divs').value.trim();

        if (d1Str === "" || d2Str === "") {
            falarComLeoRapido("Preencha o dividendo e o divisor primeiro!");
            return;
        }

        if (d1Str.includes(',') || d1Str.includes('.') || d2Str.includes(',') || d2Str.includes('.')) {
            falarComLeoRapido("A Lousa é para números inteiros! Se tiver vírgula, use o Canhão Sumi-Vírgula!");
            return;
        }

        const d1 = parseInt(d1Str);
        const d2 = parseInt(d2Str);

        if (isNaN(d1) || isNaN(d2) || d2 === 0) {
            falarComLeoRapido("Números inválidos ou divisor igual a zero!");
            return;
        }

        dynamicSteps = generateDivisionSteps(d1, d2);
        console.log("Passos gerados:", dynamicSteps); // Log para depuração
        
        if (dynamicSteps.length === 0) {
            falarComLeoRapido("Erro ao gerar os passos. Tente outros números.");
            return;
        }

        activeStepIndex = 0;

        document.getElementById('col-dividend').innerHTML = `<div class="font-extrabold tracking-widest text-white text-4xl mb-2">${d1}</div>`;
        document.getElementById('div-divisor').innerText = d2;
        document.getElementById('div-quociente').innerHTML = "";
        const master = document.getElementById('master-input');
        master.value = "";
        master.disabled = false;
        master.readOnly = false;  // Removido readonly para permitir digitação
        master.className = "w-full text-center text-3xl font-black p-4 rounded-2xl border-4 border-blue-400 focus:outline-none input-active text-blue-800 bg-white";
        document.getElementById('btn-validar-lousa').innerHTML = `<span>Verificar Meu Passo</span> <i class="fa-solid fa-circle-check"></i>`;
        document.getElementById('btn-validar-lousa').className = "w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-4 px-6 rounded-2xl shadow-md active:scale-95 transition-all text-lg flex items-center justify-center gap-2";

        renderizarInstrucaoAtual();
    }

    function generateDivisionSteps(dividend, divisor) {
        let steps = [];
        let divStr = dividend.toString();
        let currentVal = parseInt(divStr[0]);
        let idx = 0;

        while (currentVal < divisor && idx < divStr.length - 1) {
            idx++;
            currentVal = currentVal * 10 + parseInt(divStr[idx]);
        }

        let isDecimal = false;
        let precision = 0;
        const MAX_PRECISION = 4;

        while (true) {
            let qDigit = Math.floor(currentVal / divisor);
            let sub = qDigit * divisor;
            let rem = currentVal - sub;

            steps.push({
                type: 'q_digit',
                val: qDigit.toString(),
                msg: `Quantas vezes o ${divisor} cabe no ${currentVal}? (Dica: tabuada do ${divisor})`,
                helper: `Digite o quociente para ${currentVal} ÷ ${divisor}`
            });
            
            steps.push({
                type: 'sub',
                val: sub.toString(),
                msg: `Muito bem! ${qDigit} × ${divisor} = ${sub}. Vamos subtrair.`,
                helper: `Digite ${sub} para subtrair na lousa.`
            });

            if (idx < divStr.length - 1) {
                idx++;
                let nextDigit = divStr[idx];
                let nextVal = rem * 10 + parseInt(nextDigit);
                steps.push({
                    type: 'rem',
                    val: nextVal.toString(),
                    valAlt: (rem === 0 ? nextDigit : nextVal.toString()),
                    msg: `Subtraia ${sub} de ${currentVal} e abaixe o próximo número (${nextDigit}).`,
                    helper: `Digite o resultado da sobra (abaixando o ${nextDigit}).`
                });
                currentVal = nextVal;
            } else {
                if (rem === 0) {
                    steps.push({
                        type: 'rem_final',
                        val: "0",
                        msg: `Chegamos ao fim! Subtraia ${sub} de ${currentVal}.`,
                        helper: `Digite o resto final (0).`
                    });
                    break;
                } else {
                    // Precisamos lidar com o resto e vírgula
                    if (!isDecimal) {
                        steps.push({
                            type: 'rem_pre_comma',
                            val: rem.toString(),
                            msg: `Subtraia ${sub} de ${currentVal}. Este é o resto.`,
                            helper: `Digite o resto (${rem}).`
                        });
                        steps.push({
                            type: 'comma',
                            val: ",",
                            msg: `Sobrou ${rem} e não há mais números para abaixar. Hora da vírgula!`,
                            helper: `Digite a vírgula ( , ) no teclado virtual!`
                        });
                        isDecimal = true;
                        // Não reinicia o loop ainda, na próxima iteração gera o resto decimal
                        // Precisamos transformar o resto em décimos
                        // Vamos forçar a geração do próximo valor decimal
                        let nextVal = rem * 10;
                        steps.push({
                            type: 'rem_decimal',
                            val: nextVal.toString(),
                            msg: `Adicione o zero mágico ao resto para continuarmos dividindo!`,
                            helper: `Transforme o resto ${rem} em ${nextVal} décimos.`
                        });
                        currentVal = nextVal;
                        precision++;
                        continue; // vai para próxima iteração já com valor decimal
                    } else {
                        // Já estávamos nos decimais
                        steps.push({
                            type: 'rem_pre_zero',
                            val: rem.toString(),
                            msg: `Subtraia ${sub} de ${currentVal}.`,
                            helper: `Digite o resto decimal (${rem}).`
                        });

                        if (precision >= MAX_PRECISION) {
                            steps.push({
                                type: 'rem_final',
                                val: rem.toString(),
                                msg: `Vamos parar por aqui! A conta deu uma dízima ou possui muitas casas.`,
                                helper: `Apenas valide o resto final e encerramos.`
                            });
                            break;
                        }

                        let nextVal = rem * 10;
                        steps.push({
                            type: 'rem_decimal',
                            val: nextVal.toString(),
                            msg: `Adicione o zero mágico ao resto para continuarmos dividindo!`,
                            helper: `Transforme o resto ${rem} em ${nextVal} décimos/centésimos.`
                        });
                        currentVal = nextVal;
                        precision++;
                    }
                }
            }
        }
        return steps;
    }

    function renderizarInstrucaoAtual() {
        const masterInput = document.getElementById('master-input');
        const instrucao = document.getElementById('instrucao-lousa');
        const helper = document.getElementById('lousa-helper');
        const btn = document.getElementById('btn-validar-lousa');

        if (activeStepIndex >= dynamicSteps.length) {
            instrucao.innerHTML = "💥 <strong>SENSACIONAL!</strong> Conta finalizada com perfeição!";
            helper.innerText = "🎉 PARABÉNS! Você dominou o algoritmo!";
            masterInput.value = "✔️";
            masterInput.disabled = true;
            masterInput.readOnly = true;
            masterInput.className = "w-full text-center text-3xl font-black p-4 rounded-2xl border-4 border-emerald-500 focus:outline-none text-emerald-600 bg-emerald-50";
            
            btn.innerHTML = `<span>CONCLUÍDO! (+30 XP)</span>`;
            btn.className = "w-full bg-slate-400 text-white font-black py-4 px-6 rounded-2xl shadow-md transition-all text-lg flex items-center justify-center cursor-not-allowed";
            
            ganharXP(30);
            triggerConfetti();
            playSound('success');
            return;
        }

        const step = dynamicSteps[activeStepIndex];
        instrucao.innerHTML = step.msg;
        helper.innerText = step.helper;
        masterInput.value = "";
        masterInput.className = "w-full text-center text-3xl font-black p-4 rounded-2xl border-4 border-blue-400 focus:outline-none input-active text-blue-800 bg-white";
        masterInput.disabled = false;
        masterInput.readOnly = false;
    }

    function pressVirtualKey(key) {
        playSound('click');
        const input = document.getElementById('master-input');
        if (input.disabled) return;

        if (key === 'delete') {
            input.value = input.value.slice(0, -1);
        } else {
            if (input.value.length < 5) {
                input.value += key;
            }
        }
        // Mantém o foco para facilitar
        input.focus();
    }

    function validarPassoDinamico() {
        console.log("Tentando validar passo..."); // Log para depuração
        if (activeStepIndex >= dynamicSteps.length) return;

        const input = document.getElementById('master-input');
        const val = input.value.trim();
        const step = dynamicSteps[activeStepIndex];

        if (!step) {
            falarComLeoRapido("Ops! Passo não encontrado. Reinicie a conta.");
            return;
        }

        if (val === "") {
            playSound('fail');
            falarComLeoRapido("Ei! Escreva o valor correto usando o teclado virtual!");
            input.className = "w-full text-center text-3xl font-black p-4 rounded-2xl border-4 border-red-400 focus:outline-none text-red-700 bg-red-50 animate-pulse";
            setTimeout(() => {
                input.className = "w-full text-center text-3xl font-black p-4 rounded-2xl border-4 border-blue-400 focus:outline-none input-active text-blue-800 bg-white";
            }, 1500);
            return;
        }

        if (val === step.val || val === step.valAlt) {
            playSound('success');
            ganharXP(5);
            adicionarElementoNaLousa(step, val);
            
            // Feedback visual de acerto
            input.className = "w-full text-center text-3xl font-black p-4 rounded-2xl border-4 border-emerald-500 focus:outline-none text-emerald-700 bg-emerald-50";
            setTimeout(() => {
                input.className = "w-full text-center text-3xl font-black p-4 rounded-2xl border-4 border-blue-400 focus:outline-none input-active text-blue-800 bg-white";
            }, 800);

            activeStepIndex++;
            renderizarInstrucaoAtual();
        } else {
            playSound('fail');
            
            // Feedback visual de erro
            input.className = "w-full text-center text-3xl font-black p-4 rounded-2xl border-4 border-red-500 focus:outline-none text-red-700 bg-red-50 animate-pulse";
            setTimeout(() => {
                input.className = "w-full text-center text-3xl font-black p-4 rounded-2xl border-4 border-blue-400 focus:outline-none input-active text-blue-800 bg-white";
            }, 1500);

            let dicaExtra = `O valor esperado é: <strong>${step.val}</strong>. Tente novamente!`;
            if (step.type === 'q_digit' && step.val === '0' && val === ',') {
                dicaExtra = "⚠️ Armadilha do Zero! O número que você abaixou tem que ser dividido antes da vírgula! Ele cabe 0 vezes.";
            } else if (step.type === 'comma') {
                dicaExtra = "⚠️ Você precisa digitar a vírgula ( , ) neste passo!";
            } else if (step.type === 'sub') {
                dicaExtra = `Lembre-se: ${step.val} é o resultado da multiplicação do último quociente pelo divisor.`;
            }
            falarComLeoRapido(dicaExtra);
            // Mostra também na tela da lousa
            document.getElementById('lousa-helper').innerHTML = `<span class="text-red-600">${dicaExtra}</span>`;
        }
    }

    function adicionarElementoNaLousa(step, typedVal) {
        const colDivd = document.getElementById('col-dividend');
        const colQuoc = document.getElementById('div-quociente');

        if (step.type === 'q_digit') {
            colQuoc.innerHTML += `<span>${typedVal}</span>`;
        } else if (step.type === 'comma') {
            colQuoc.innerHTML += `<span class="text-pink-500 mx-0.5 animate-bounce">,</span>`;
        } else if (step.type === 'sub') {
            colDivd.innerHTML += `<div class="text-red-400 text-xl font-bold tracking-widest mt-1">- ${typedVal}</div>`;
        } else if (step.type === 'rem' || step.type === 'rem_pre_comma' || step.type === 'rem_pre_zero') {
            colDivd.innerHTML += `<div class="border-t-2 border-slate-600 text-slate-300 pt-1 text-2xl font-bold tracking-widest">${typedVal}</div>`;
        } else if (step.type === 'rem_decimal') {
            colDivd.innerHTML += `<div class="text-emerald-300 text-2xl font-bold tracking-widest mt-1">${typedVal} <span class="text-[10px] font-sans text-emerald-500 uppercase ml-1">décimos</span></div>`;
        } else if (step.type === 'rem_final') {
            if (step.val === "0") {
                colDivd.innerHTML += `<div class="border-t-2 border-slate-600 text-emerald-400 pt-1 font-black text-3xl tracking-widest mt-1">0</div>`;
            } else {
                colDivd.innerHTML += `<div class="border-t-2 border-slate-600 text-yellow-400 pt-1 font-black text-2xl tracking-widest mt-1">${typedVal}</div>`;
            }
        }
    }

    // Teclado físico: captura números, vírgula e Backspace
    document.addEventListener('keydown', function(event) {
        if (currentTab === 'armadilha') {
            const activeEl = document.activeElement;
            // Só bloqueia se o foco estiver nos campos de criação
            if (activeEl.id !== 'custom-divd' && activeEl.id !== 'custom-divs') {
                const key = event.key;
                if (/[0-9,]/.test(key)) {
                    event.preventDefault();
                    pressVirtualKey(key);
                } else if (key === 'Backspace') {
                    event.preventDefault();
                    pressVirtualKey('delete');
                } else if (key === 'Enter') {
                    event.preventDefault();
                    validarPassoDinamico();
                }
            }
        }
    });


    // --- LÓGICA DO MÓDULO 2: CANHÃO SUMI-VÍRGULA (sem alterações) ---
    let canhaoN1 = 56.4;
    let canhaoN2 = 6;

    function carregarCasoCanhao(n1, n2) {
        playSound('click');
        canhaoN1 = n1;
        canhaoN2 = n2;

        document.getElementById('canhao-divd').innerText = n1.toString().replace('.', ',');
        document.getElementById('canhao-divs').innerText = n2.toString().replace('.', ',');

        const dp1 = (n1.toString().includes('.')) ? n1.toString().split('.')[1].length : 0;
        const dp2 = (n2.toString().includes('.')) ? n2.toString().split('.')[1].length : 0;

        document.getElementById('canhao-divd-casas').innerText = `${dp1} casa(s) decimal(ais)`;
        document.getElementById('canhao-divs-casas').innerText = `${dp2} casa(s) decimal(ais)`;

        const feed = document.getElementById('canhao-feedback');
        feed.classList.add('hidden');
    }

    function dispararCanhao(mult) {
        const dp1 = (canhaoN1.toString().includes('.')) ? canhaoN1.toString().split('.')[1].length : 0;
        const dp2 = (canhaoN2.toString().includes('.')) ? canhaoN2.toString().split('.')[1].length : 0;
        const maxCasas = Math.max(dp1, dp2);
        const multCorreto = Math.pow(10, maxCasas);

        const feed = document.getElementById('canhao-feedback');
        feed.classList.remove('hidden');

        const finalN1 = Math.round(canhaoN1 * mult);
        const finalN2 = Math.round(canhaoN2 * mult);

        if (mult === multCorreto) {
            playSound('success');
            triggerConfetti();
            ganharXP(20);

            feed.className = "p-4 rounded-2xl text-center font-bold text-base border-2 bg-emerald-100 text-emerald-800 border-emerald-300 block";
            feed.innerHTML = `🎯 ALVO ACERTADO! Multiplicando por <strong>${mult}</strong>, as vírgulas somem dos dois lados!<br>
            A conta original se transforma em: <span class="text-2xl font-black block my-2 text-emerald-900">${finalN1} ÷ ${finalN2}</span>
            Agora você pode jogar essa conta na Lousa Mágica sem problemas! (+20 XP)`;
        } else {
            playSound('fail');
            feed.className = "p-4 rounded-2xl text-center font-bold text-base border-2 bg-red-100 text-red-800 border-red-300 block";
            
            if (mult < multCorreto) {
                feed.innerHTML = `💥 Quase lá! O canhão disparou ×${mult}, mas a vírgula ainda sobrou em algum lugar. Escolha um multiplicador maior para eliminar todas as vírgulas!`;
            } else {
                feed.innerHTML = `💥 Força exagerada! Você usou ×${mult}, o que elimina as vírgulas, mas deixa números grandes desnecessários (como ${finalN1} ÷ ${finalN2}). Use o menor multiplicador ideal!`;
            }
        }
    }


    // --- LÓGICA DO MÓDULO 3: ARENA DE TREINO (sem alterações) ---
    let perguntaAtiva = {};
    const bancoPerguntas = [
        { q: "Qual o resultado de 6 ÷ 5 em quociente decimal?", r: "1,2", t: "Divida 6 por 5. Sobra 1 de resto. Adicione a vírgula para transformar o resto em 10 décimos!" },
        { q: "Se eliminarmos a vírgula de 56,4 ÷ 6 multiplicando por 10, qual conta teremos?", r: "564÷60", t: "Multiplicar por 10 desloca a vírgula uma casa para a direita nos dois lados!" },
        { q: "Dona Joaquina quer dividir 10 chocolates para 8 netos. Quanto ganha cada neto?", r: "1,25", t: "Primeiro distribua 1 inteiro para cada. Os 2 de resto viram 20 décimos!" },
        { q: "Qual o resultado de 123 dividido por 6?", r: "20,5", t: "Lembre-se da lousa! Cuidado com o zero após abaixar o 3!" },
        { q: "Se dividirmos 3 por 20, quanto dá o quociente decimal?", r: "0,15", t: "3 é menor que 20. Comece colocando 0, no quociente para transformar em 30 décimos!" },
        { q: "Ao dividir 25 por 3, temos uma dízima periódica. Qual algarismo se repete infinitamente?", r: "3", t: "Dica: 8,3333... Colocamos um traço no algarismo que é o período." }
    ];

    function carregarPerguntaArena() {
        document.getElementById('arena-feedback').classList.add('hidden');
        document.getElementById('arena-answer').value = '';

        const idx = Math.floor(Math.random() * bancoPerguntas.length);
        perguntaAtiva = bancoPerguntas[idx];

        document.getElementById('arena-question').innerText = perguntaAtiva.q;
        document.getElementById('arena-tip').innerText = `Dica do Leo: ${perguntaAtiva.t}`;
    }

    function verificarQuiz() {
        const rawAns = document.getElementById('arena-answer').value.trim().replace(/\s/g, '').replace(',', '.');
        const targetAns = perguntaAtiva.r.replace(',', '.');

        const feedback = document.getElementById('arena-feedback');
        feedback.classList.remove('hidden');

        if (rawAns === "") {
            playSound('fail');
            feedback.className = "mt-6 p-4 rounded-2xl text-center font-bold border-2 bg-amber-100 text-amber-800 border-amber-300 block";
            feedback.innerHTML = "⚠️ Por favor, digite um número antes de enviar!";
            return;
        }

        if (rawAns === targetAns) {
            playSound('success');
            triggerConfetti();
            ganharXP(25);

            feedback.className = "mt-6 p-4 rounded-2xl text-center font-bold border-2 bg-emerald-100 text-emerald-800 border-emerald-300 block";
            feedback.innerHTML = `🎉 ABSOLUTAMENTE CORRETO! O dragão Leo ganhou +25 XP!`;
            
            setTimeout(() => {
                carregarPerguntaArena();
            }, 2500);
        } else {
            playSound('fail');
            feedback.className = "mt-6 p-4 rounded-2xl text-center font-bold border-2 bg-red-100 text-red-800 border-red-300 block";
            feedback.innerHTML = `❌ Ops, quase lá! A resposta correta é ${perguntaAtiva.r}. Use uma folha de rascunho e tente novamente!`;
        }
    }

    function pularPergunta() {
        playSound('click');
        carregarPerguntaArena();
    }

    // --- INICIALIZAÇÃO AUTOMÁTICA ---
    window.onload = function() {
        atualizarProgressoVisual();
        
        document.getElementById('custom-divd').value = "123";
        document.getElementById('custom-divs').value = "6";
        iniciarContaDinamica();
        
        carregarCasoCanhao(56.4, 6);
        carregarPerguntaArena();
    };
</script>
